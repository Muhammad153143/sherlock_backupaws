<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SherLock</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">🏠 SherLock</a>
        <div class="nav-links" id="navLinks">
            <a href="index.html">🏠 Home</a>
            <a href="login.html">🔐 Login</a>
            <a href="register.html">📝 Register</a>
        </div>
    </nav>

    <div class="container">
        <div class="card" style="max-width: 500px; margin: 4rem auto;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <span style="font-size: 3rem;">🔒</span>
                <h2>Reset Password</h2>
                <p style="color: var(--text-light);">Enter your new password</p>
            </div>

            <form id="resetForm">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn">Update Password</button>
            </form>

            <div id="message" style="margin-top:1rem;"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('resetForm');
        const messageEl = document.getElementById('message');
        function getTokenFromPath() {
            const parts = window.location.pathname.split('/');
            return parts[parts.length - 1];
        }
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageEl.textContent = '';
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const token = getTokenFromPath();
            try {
                const res = await fetch(`/api/auth/reset-password/${token}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password, confirmPassword })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Request failed');
                messageEl.style.color = 'green';
                messageEl.textContent = 'Password updated. Redirecting to login...';
                setTimeout(() => { window.location.href = 'login.html'; }, 1500);
            } catch (err) {
                messageEl.style.color = 'red';
                messageEl.textContent = err.message;
            }
        });
    </script>
    <script src="../js/app.js"></script>
</body>
</html>
